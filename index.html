<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For the Best Mom ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --cake-color: #ff80ab;
            --cake-top: #fce4ec;
            --cake-side: #f06292;
            --plate-color: #e0e0e0;
        }

        body {
            margin: 0; background: #050505; color: white;
            font-family: 'Montserrat', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #stars {
            position: fixed; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
        }

        .container { text-align: center; width: 100%; max-width: 600px; z-index: 10; }

        /* --- 3D SQUARE CAKE --- */
        .cake-wrapper {
            perspective: 1000px; margin: 50px auto;
            width: 200px; height: 200px;
        }

        .cake-3d {
            position: relative; width: 200px; height: 120px;
            transform-style: preserve-3d;
            transform: rotateX(-15deg) rotateY(-20deg);
            animation: slowRotate 10s infinite linear;
        }

        @keyframes slowRotate {
            0% { transform: rotateX(-15deg) rotateY(0deg); }
            100% { transform: rotateX(-15deg) rotateY(360deg); }
        }

        /* Square Layers */
        .cube-layer {
            position: absolute; width: 200px; height: 100px;
            transform-style: preserve-3d;
        }

        .side {
            position: absolute; width: 200px; height: 80px;
            background: var(--cake-side); border: 1px solid rgba(0,0,0,0.1);
        }

        .front  { transform: translateZ(100px); }
        .back   { transform: rotateY(180deg) translateZ(100px); }
        .left   { transform: rotateY(-90deg) translateZ(100px); }
        .right  { transform: rotateY(90deg) translateZ(100px); }
        .top    { 
            width: 200px; height: 200px; background: var(--cake-top);
            transform: rotateX(90deg) translateZ(100px); 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        /* Drip Effect */
        .top::after {
            content: ''; position: absolute; top:0; left:0; width: 100%; height:100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,0.2) 20px, rgba(255,255,255,0.2) 40px);
        }

        /* CANDLES */
        .candle-stick {
            position: absolute; width: 8px; height: 40px; background: #fff;
            top: -40px; left: 50%; transform: translateZ(0);
        }

        .flame {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 20px; background: orange; border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px yellow; animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker { to { opacity: 0.7; transform: translateX(-50%) scale(1.2); } }

        /* --- SQUARE PHOTO SECTION --- */
        .photo-frame {
            display: none; width: 250px; background: white; padding: 15px;
            margin: 20px auto; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: photoSlide 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes photoSlide { from { transform: translateY(100px) rotate(10deg); opacity: 0; } }

        .photo-frame img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            filter: grayscale(20%); border: 1px solid #ddd;
        }

        .photo-caption {
            color: #333; font-family: 'Dancing Script', cursive;
            font-size: 1.5rem; margin-top: 15px;
        }

        /* UI BUTTONS */
        .btn {
            background: #ff4081; color: white; border: none;
            padding: 15px 30px; font-size: 1rem; border-radius: 5px;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
        }

        .btn:hover { background: #f50057; transform: translateY(-2px); }

    </style>
</head>
<body>

<div id="stars"></div>

<div class="container" id="stage">
    <h1 id="title" style="font-family: 'Dancing Script'; font-size: 3rem;">A Gift for You ❤️</h1>
    
    <div class="cake-wrapper" id="cake-container">
        <div class="cake-3d">
            <div class="cube-layer">
                <div class="side front"></div>
                <div class="side back"></div>
                <div class="side left"></div>
                <div class="side right"></div>
                <div class="top">
                    <div class="candle-stick" style="margin-left: -40px;"><div class="flame"></div></div>
                    <div class="candle-stick" style="margin-left: 0px;"><div class="flame"></div></div>
                    <div class="candle-stick" style="margin-left: 40px;"><div class="flame"></div></div>
                </div>
            </div>
        </div>
    </div>

    <button class="btn" id="actionBtn" onclick="process()">Make a Wish ✨</button>

    <div class="photo-frame" id="photoBox">
        <img src="mom.jpg" alt="Mom" onerror="this.src='https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=400'">
        <div class="photo-caption">Happy Birthday, Mom!</div>
    </div>
</div>

<audio id="audio" src="birthday.mp3"></audio>

<script>
    let step = 0;

    function process() {
        const btn = document.getElementById('actionBtn');
        const cake = document.getElementById('cake-container');
        const photo = document.getElementById('photoBox');
        const title = document.getElementById('title');
        const audio = document.getElementById('audio');

        if (step === 0) {
            // Blow Candles
            document.querySelectorAll('.flame').forEach(f => f.style.display = 'none');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            btn.innerText = "See Your Surprise 🎁";
            title.innerText = "Wish Granted! ✨";
            step++;
        } 
        else if (step === 1) {
            // Show Photo
            cake.style.display = 'none';
            photo.style.display = 'block';
            btn.innerText = "Celebrate! 🎉";
            title.innerText = "Happy Birthday Mom!";
            title.style.color = "#ff4081";
            audio.play();
            
            // Continuous Celebration
            var end = Date.now() + (10 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
            step++;
        }
    }
</script>

</body>
</html>

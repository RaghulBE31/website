<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ma ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Initial Screen */
        #intro {
            z-index: 10;
        }

        /* Cake Screen Styling */
        #cakeScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease;
        }

        /* REALISTIC CHOCOLATE CAKE DESIGN */
        .cake {
            position: relative;
            width: 200px;
            height: 120px;
            background: #3d1e1e; /* Chocolate Brown */
            border-radius: 100px / 40px;
            box-shadow: 0 10px 0 #2b1515, 0 15px 20px rgba(0,0,0,0.5);
            margin-bottom: 60px;
        }

        .cake::before {
            content: "";
            position: absolute;
            top: -20px;
            left: 0;
            width: 200px;
            height: 80px;
            background: #f5f5f5; /* Creamy White Icing */
            border-radius: 100px / 40px;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.1);
            z-index: 2;
        }

        /* Icing Drips */
        .drip {
            position: absolute;
            top: 25px;
            width: 25px;
            height: 45px;
            background: #f5f5f5;
            border-radius: 0 0 20px 20px;
            z-index: 1;
        }

        /* Candle */
        .candle {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 50px;
            background: #ff4081;
            border-radius: 4px;
            z-index: 3;
        }

        .flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 25px;
            background: radial-gradient(circle at bottom, #fff, #ffa500, #ff4500);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ffa500;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.2); }
        }

        /* Smoke Effect */
        .smoke {
            position: absolute;
            top: -30px;
            left: 50%;
            width: 10px;
            height: 10px;
            background: rgba(200, 200, 200, 0.7);
            border-radius: 50%;
            filter: blur(5px);
            opacity: 0;
        }

        .smoke-active { animation: smokeRise 2s forwards; }

        @keyframes smokeRise {
            0% { opacity: 0.7; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(3); }
        }

        /* Square Photo (Polaroid Style) */
        #finalScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .polaroid {
            background: white;
            padding: 15px 15px 50px 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transform: rotate(-2deg);
        }

        .polaroid img {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-top: 30px;
            color: #ff4081;
        }

        /* Buttons */
        button {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            background: #ff4081;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4);
        }

        button:hover { transform: scale(1.1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="intro">
        <button onclick="startCelebration()">Start the Celebration 🎁</button>
    </div>

    <div id="cakeScreen">
        <div class="cake">
            <div class="drip" style="left: 20px;"></div>
            <div class="drip" style="left: 70px; height: 60px;"></div>
            <div class="drip" style="left: 130px;"></div>
            <div class="drip" style="left: 165px; height: 50px;"></div>
            <div class="candle">
                <div id="flame" class="flame"></div>
                <div id="smoke" class="smoke"></div>
            </div>
        </div>
        <button id="blowBtn" onclick="blowCandle()">Blow the Candle 💨</button>
    </div>

    <div id="finalScreen">
        <div class="polaroid">
            <img src="mom.jpg" alt="Mom and Dad">
        </div>
        <h1>Happy Birthday Ma ❤️</h1>
    </div>

    <audio id="bdaySong" src="birthday.mp3"></audio>

    <script>
        function startCelebration() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('cakeScreen').style.display = 'flex';
        }

        function blowCandle() {
            const flame = document.getElementById('flame');
            const smoke = document.getElementById('smoke');
            const song = document.getElementById('bdaySong');

            // 1. Blow out flame with smoke
            flame.style.display = 'none';
            smoke.classList.add('smoke-active');
            
            // 2. Play music and throw confetti
            song.play();
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });

            // 3. Reveal Photo and "Happy Birthday Ma"
            setTimeout(() => {
                document.getElementById('cakeScreen').style.display = 'none';
                document.getElementById('finalScreen').style.display = 'flex';
                
                // Keep the celebration going
                var end = Date.now() + (5 * 1000);
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }, 2000);
        }
    </script>
</body>
</html>

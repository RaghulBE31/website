<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cake-color: #fce4ec;
            --frosting: #ffffff;
            --side-color: #f8bbd0;
        }

        body {
            margin: 0;
            height: 100vh;
            background: #0a0a0a;
            color: white;
            font-family: 'Playfair Display', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* High-End Background */
        .ambient-light {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #2c1a1a 0%, #000 70%);
            z-index: -1;
        }

        .container { text-align: center; z-index: 10; }

        /* --- REALISTIC 3D SQUARE CAKE --- */
        .stage {
            perspective: 1200px;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }

        .cake {
            position: relative;
            width: 200px;
            height: 150px;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(25deg);
            transition: transform 1s ease;
        }

        .layer {
            position: absolute;
            width: 200px;
            height: 120px;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            width: 200px;
            height: 120px;
            background: var(--side-color);
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .front  { transform: rotateY(0deg) translateZ(100px); }
        .back   { transform: rotateY(180deg) translateZ(100px); }
        .left   { transform: rotateY(-90deg) translateZ(100px); }
        .right  { transform: rotateY(90deg) translateZ(100px); }
        .top    { 
            width: 200px; height: 200px; 
            background: var(--cake-color);
            transform: rotateX(90deg) translateZ(100px);
            box-shadow: inset 0 0 40px rgba(255,255,255,0.8);
        }

        /* Realistic Frosting Drips */
        .drip {
            position: absolute; width: 20px; height: 40px;
            background: var(--frosting);
            border-radius: 0 0 20px 20px;
            top: 0;
        }

        /* --- CANDLES & FLAME --- */
        .candle-group {
            position: absolute; width: 100%; height: 100%;
            transform: rotateX(-90deg) translateZ(110px);
        }

        .candle {
            position: absolute; width: 10px; height: 50px;
            background: linear-gradient(to bottom, #fff, #ffd1dc);
            bottom: 0; left: 50%;
        }

        .flame {
            position: absolute; top: -25px; left: 50%;
            transform: translateX(-50%);
            width: 15px; height: 25px;
            background: radial-gradient(circle at bottom, #fff, #ffa500, #ff4500);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px 5px rgba(255,165,0,0.5);
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-1deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(1deg); }
        }

        /* Smoke Particles */
        .smoke {
            position: absolute; top: -30px; left: 50%;
            width: 8px; height: 8px; background: rgba(200,200,200,0.6);
            border-radius: 50%; filter: blur(5px);
            opacity: 0;
        }

        .blow-animation { animation: smokeRise 2s forwards; }

        @keyframes smokeRise {
            0% { opacity: 0.8; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(4); }
        }

        /* --- SQUARE PHOTO FRAME --- */
        .photo-reveal {
            display: none; opacity: 0; transform: scale(0.8);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .polaroid {
            background: white; padding: 15px 15px 60px 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: inline-block; transform: rotate(-3deg);
        }

        .polaroid img {
            width: 250px; height: 250px; object-fit: cover;
            border: 1px solid #eee;
        }

        .caption {
            font-family: 'Dancing Script', cursive; color: #333;
            font-size: 2rem; margin-top: 20px;
        }

        /* Interaction Elements */
        .btn {
            margin-top: 50px; padding: 15px 40px; font-size: 1.2rem;
            background: #e91e63; color: white; border: none;
            border-radius: 4px; cursor: pointer; transition: 0.3s;
        }

        .btn:hover { background: #c2185b; transform: scale(1.05); }

    </style>
</head>
<body>

<div class="ambient-light"></div>

<div class="container">
    <h1 id="headline">Happy Birthday, Mom</h1>

    <div class="stage" id="cakeStage">
        <div class="cake">
            <div class="layer">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="top">
                    <div class="drip" style="left: 10px;"></div>
                    <div class="drip" style="left: 50px;"></div>
                    <div class="drip" style="left: 140px;"></div>
                    <div class="drip" style="left: 180px;"></div>
                    
                    <div class="candle-group">
                        <div class="candle" style="left: 50%; transform: translateX(-50%);">
                            <div class="flame" id="flame"></div>
                            <div id="smoke" class="smoke"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="photo-reveal" id="photoReveal">
        <div class="polaroid">
            <img src="mom.jpg" alt="Mom" onerror="this.src='https://via.placeholder.com/250x250?text=Mom'">
            <div class="caption">I Love You ❤️</div>
        </div>
    </div>

    <br>
    <button class="btn" id="actionBtn" onclick="handleAction()">Blow the Candle 💨</button>
</div>

<audio id="music" src="birthday.mp3"></audio>

<script>
    let state = 'CAKE';

    function handleAction() {
        const flame = document.getElementById('flame');
        const smoke = document.getElementById('smoke');
        const btn = document.getElementById('actionBtn');
        const cakeStage = document.getElementById('cakeStage');
        const photo = document.getElementById('photoReveal');
        const headline = document.getElementById('headline');
        const music = document.getElementById('music');

        if (state === 'CAKE') {
            // 1. Blow out flame (Real smoke effect)
            flame.style.display = 'none';
            smoke.classList.add('blow-animation');
            
            btn.innerText = "Open Your Present 🎁";
            headline.innerText = "Make a Wish...";
            state = 'READY';
        } 
        else if (state === 'READY') {
            // 2. Hide cake, show Square Photo
            cakeStage.style.transition = "0.8s";
            cakeStage.style.transform = "scale(0) rotateY(180deg)";
            cakeStage.style.opacity = "0";

            setTimeout(() => {
                cakeStage.style.display = 'none';
                photo.style.display = 'block';
                setTimeout(() => {
                    photo.style.opacity = '1';
                    photo.style.transform = 'scale(1) rotate(0deg)';
                }, 100);
                
                headline.innerText = "You Are My Everything";
                headline.style.fontFamily = "'Dancing Script', cursive";
                btn.style.display = 'none';
                music.play();
            }, 800);
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<!-- INTRO SCREEN -->

<div id="intro">

<h1>A Surprise For Mom ❤️</h1>

<button id="startBtn">Start the Surprise 🎁</button>

</div>

<!-- CAKE SCREEN -->

<div id="cakeScreen">

<div class="cake">

<div class="candles">

<div class="candle">
<div class="flame"></div>
</div>

<div class="candle">
<div class="flame"></div>
</div>

<div class="candle">
<div class="flame"></div>
</div>

</div>

<div class="layer layer1"></div>
<div class="layer layer2"></div>
<div class="layer layer3"></div>

</div>

<button id="blowBtn">Blow the Candles 💨</button>

</div>

<!-- POPUP -->

<div id="popup">

<div class="card">

<h1>🎉 Happy Birthday Mom 🎉</h1>

<img src="mom.jpg">

<p>
You are the best mother in the world ❤️
Thank you for everything.
</p>

</div>

</div>

<audio id="song">
<source src="birthday.mp3">
</audio>

<script src="script.js" defer></script>

</body>
</html>

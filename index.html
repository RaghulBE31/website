<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Happy Birthday Mom ❤️</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<div id="stars"></div>

<!-- INTRO SCREEN -->

<div id="intro">
<h1>A Surprise For Mom ❤️</h1>
<button id="startBtn">Start the Celebration 🎁</button>
</div>

<!-- CAKE SCREEN -->

<div id="cakeScreen">

<div class="cake">

<div class="plate"></div>

<div class="layer layer-bottom"></div>
<div class="layer layer-middle"></div>
<div class="layer layer-top"></div>

<div class="icing"></div>

<div class="candles">

<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>

</div>

</div>

<br>

<button id="blowBtn">Blow the Candles 💨</button>

</div>

<!-- POPUP -->

<div id="popup">

<div class="card">

<h1>🎉 Happy Birthday Mom 🎉</h1>

<img src="mom.jpg">

<p>
You are the most wonderful mother in the world ❤️  
Thank you for everything you have done for me.
</p>

</div>

</div>

<audio id="song">
<source src="birthday.mp3">
</audio>

<script src="script.js" defer></script>

</body>
</html>

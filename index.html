<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Mom ❤️</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    color:white;
}

.container{
    margin-top:100px;
}

h1{
    font-size:60px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff;
    }
    to{
        text-shadow:0 0 30px #ff4081;
    }
}

img{
    width:220px;
    border-radius:50%;
    border:5px solid white;
    margin-top:20px;
}

p{
    font-size:22px;
    width:70%;
    margin:auto;
    margin-top:20px;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    background:#ff4081;
    color:white;
    border-radius:10px;
    margin-top:30px;
    cursor:pointer;
}

button:hover{
    background:#e91e63;
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Mom 🎂</h1>

<img src="mom.jpg">

<p>
Dear Mom ❤️  
Thank you for always loving me, supporting me, and believing in me.  
You are the best mother in the world.  
I am so lucky to have you in my life.  

Today is your special day, and I wish you happiness, health, and many more beautiful years ahead.

Love you always 💖
</p>

<button onclick="playMusic()">Play Birthday Song 🎵</button>

</div>

<audio id="song">
<source src="birthday.mp3" type="audio/mp3">
</audio>

<script>

function playMusic(){
    document.getElementById("song").play();
}

</script>

</body>
</html>
